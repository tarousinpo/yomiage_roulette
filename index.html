<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>読み上げルーレット</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #f9d423, #ff4e50);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #a0a0c0;
      margin-bottom: 32px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 640px;
      backdrop-filter: blur(8px);
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #a0b0d0;
      margin-bottom: 8px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    textarea {
      width: 100%;
      min-height: 100px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #e8e8ff;
      font-size: 1rem;
      padding: 12px 14px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    textarea:focus { border-color: #f9d423; }
    textarea::placeholder { color: #556; }

    .hint {
      font-size: 0.78rem;
      color: #778;
      margin-top: 6px;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      padding: 12px 24px;
      transition: transform 0.1s, opacity 0.2s, box-shadow 0.2s;
      letter-spacing: 0.04em;
    }
    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    #btnStart {
      flex: 1;
      background: linear-gradient(135deg, #f9d423, #ff4e50);
      color: #1a1a2e;
      font-size: 1.1rem;
      box-shadow: 0 4px 20px rgba(249,212,35,0.35);
    }
    #btnStart:hover:not(:disabled) { box-shadow: 0 6px 28px rgba(249,212,35,0.55); }

    #btnReset {
      background: rgba(255,255,255,0.1);
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.15);
    }
    #btnReset:hover:not(:disabled) { background: rgba(255,255,255,0.18); }

    /* ── Roulette display ── */
    .roulette-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .roulette-wrap.visible { display: flex; }

    .roulette-drum {
      width: 100%;
      max-width: 500px;
      height: 80px;
      overflow: hidden;
      position: relative;
      border-radius: 12px;
      background: rgba(0,0,0,0.45);
      border: 2px solid rgba(255,255,255,0.12);
    }
    .roulette-drum::before,
    .roulette-drum::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 20px;
      z-index: 2;
      pointer-events: none;
    }
    .roulette-drum::before {
      top: 0;
      background: linear-gradient(to bottom, rgba(15,52,96,0.9), transparent);
    }
    .roulette-drum::after {
      bottom: 0;
      background: linear-gradient(to top, rgba(15,52,96,0.9), transparent);
    }

    .drum-center-line {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 90%; height: 36px;
      border: 2px solid rgba(249,212,35,0.6);
      border-radius: 8px;
      z-index: 3;
      pointer-events: none;
    }

    #drumTrack {
      position: absolute;
      left: 0; right: 0;
      top: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .drum-item {
      height: 80px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      padding: 0 16px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Result ── */
    #resultBox {
      text-align: center;
      padding: 8px 16px 4px;
    }

    #resultLabel {
      font-size: 0.82rem;
      color: #a0b0c0;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    #resultText {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(90deg, #f9d423, #ff4e50);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      min-height: 2.8rem;
      word-break: break-all;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    #speakBtn {
      background: rgba(249,212,35,0.15);
      border: 1px solid rgba(249,212,35,0.4);
      color: #f9d423;
      font-size: 0.9rem;
      padding: 7px 18px;
      margin-top: 4px;
    }
    #speakBtn:hover:not(:disabled) { background: rgba(249,212,35,0.28); }

    /* ── Item chips ── */
    .section-title {
      font-size: 0.82rem;
      color: #a0b0c0;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #dde;
      transition: background 0.2s;
    }
    .chip.drawn {
      background: rgba(255,78,80,0.15);
      border-color: rgba(255,78,80,0.35);
      color: #ff8080;
      text-decoration: line-through;
      opacity: 0.6;
    }

    /* ── Status ── */
    #statusMsg {
      font-size: 0.88rem;
      color: #f9d423;
      min-height: 1.4em;
      text-align: center;
    }

    /* ── confetti canvas ── */
    #confettiCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
    }

    .empty-note {
      color: #556;
      font-size: 0.9rem;
      font-style: italic;
    }
  </style>
</head>
<body>

<canvas id="confettiCanvas"></canvas>

<h1>🎰 読み上げルーレット</h1>
<p class="subtitle">項目を入力して抽選しよう！結果は自動で読み上げます🔊</p>

<!-- Input card -->
<div class="card" id="inputCard">
  <label for="itemInput">抽選する項目を入力</label>
  <textarea id="itemInput" placeholder="例：りんご, バナナ, ぶどう, メロン&#10;（カンマ・改行・スペースで区切れます）"></textarea>
  <p class="hint">区切り文字：カンマ（,）、読点（、）、改行、半角スペース</p>
  <div class="btn-row">
    <button id="btnStart" onclick="startLottery()">🎯 抽選開始！</button>
    <button id="btnReset" onclick="resetAll()">↺ リセット</button>
  </div>
</div>

<!-- Roulette drum card -->
<div class="card roulette-wrap" id="rouletteCard">
  <div class="roulette-drum">
    <div id="drumTrack"></div>
    <div class="drum-center-line"></div>
  </div>
  <div id="resultBox" style="display:none;">
    <p id="resultLabel">当選🎉</p>
    <div id="resultText"></div>
    <button id="speakBtn" onclick="speakResult()" style="display:none;">🔊 もう一度読み上げる</button>
  </div>
  <p id="statusMsg"></p>
</div>

<!-- Remaining items card -->
<div class="card" id="itemsCard" style="display:none;">
  <p class="section-title">📋 残り項目 (<span id="remainCount">0</span>)</p>
  <div class="chips" id="remainChips"></div>
  <div id="drawnSection" style="margin-top:16px; display:none;">
    <p class="section-title">✅ 抽選済み (<span id="drawnCount">0</span>)</p>
    <div class="chips" id="drawnChips"></div>
  </div>
</div>

<script>
  /* ─── State ─── */
  let allItems = [];
  let remainingItems = [];
  let drawnItems = [];
  let spinning = false;
  let lastResult = '';
  let animFrameId = null;

  /* ─── Parse input ─── */
  function parseItems(raw) {
    return raw
      .split(/[,、\n\r\s]+/)
      .map(s => s.trim())
      .filter(s => s.length > 0);
  }

  /* ─── UI helpers ─── */
  function setStatus(msg) {
    document.getElementById('statusMsg').textContent = msg;
  }

  function renderChips() {
    const rc = document.getElementById('remainChips');
    const dc = document.getElementById('drawnChips');
    const drawnSection = document.getElementById('drawnSection');

    rc.innerHTML = '';
    dc.innerHTML = '';

    document.getElementById('remainCount').textContent = remainingItems.length;
    document.getElementById('drawnCount').textContent = drawnItems.length;

    if (remainingItems.length === 0) {
      rc.innerHTML = '<span class="empty-note">残りなし</span>';
    } else {
      remainingItems.forEach(item => {
        const c = document.createElement('span');
        c.className = 'chip';
        c.textContent = item;
        rc.appendChild(c);
      });
    }

    if (drawnItems.length > 0) {
      drawnSection.style.display = '';
      drawnItems.forEach(item => {
        const c = document.createElement('span');
        c.className = 'chip drawn';
        c.textContent = item;
        dc.appendChild(c);
      });
    } else {
      drawnSection.style.display = 'none';
    }
  }

  /* ─── Drum animation ─── */
  function buildDrumItems(pool, winner) {
    // Build a looped sequence ending on the winner
    const track = document.getElementById('drumTrack');
    track.innerHTML = '';

    const total = DRUM_ITEM_COUNT;
    const seq = [];
    for (let i = 0; i < total - 1; i++) {
      seq.push(pool[Math.floor(Math.random() * pool.length)]);
    }
    seq.push(winner); // last item is the winner

    seq.forEach(text => {
      const div = document.createElement('div');
      div.className = 'drum-item';
      div.textContent = text;
      track.appendChild(div);
    });

    return total; // number of items
  }

  function animateDrum(totalItems, callback) {
    const track = document.getElementById('drumTrack');
    const itemHeight = 80;
    const targetOffset = -(totalItems - 1) * itemHeight; // stop at last item (winner)

    let startTime = null;
    const duration = ANIMATION_DURATION_MS;

    // Easing: fast then slow
    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
    function easeOutQuint(t) { return 1 - Math.pow(1 - t, 5); }

    function step(ts) {
      if (!startTime) startTime = ts;
      const elapsed = ts - startTime;
      const progress = Math.min(elapsed / duration, 1);

      // Blend between two easing curves for a more natural slot-machine feel
      const eased = progress < 0.6
        ? easeOutCubic(progress / 0.6) * 0.6
        : 0.6 + easeOutQuint((progress - 0.6) / 0.4) * 0.4;

      const currentOffset = eased * targetOffset;
      track.style.transform = `translateY(${currentOffset}px)`;

      if (progress < 1) {
        animFrameId = requestAnimationFrame(step);
      } else {
        track.style.transform = `translateY(${targetOffset}px)`;
        callback();
      }
    }

    animFrameId = requestAnimationFrame(step);
  }

  /* ─── Speech ─── */
  function speak(text, lang = 'ja-JP') {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = lang;
    utt.rate = 0.95;
    utt.pitch = 1.1;
    // Try to pick a Japanese voice if available
    const voices = window.speechSynthesis.getVoices();
    const jaVoice = voices.find(v => v.lang.startsWith('ja'));
    if (jaVoice) utt.voice = jaVoice;
    window.speechSynthesis.speak(utt);
  }

  function speakResult() {
    if (lastResult) speak(lastResult);
  }

  /* ─── Constants ─── */
  const DRUM_ITEM_COUNT = 30;
  const ANIMATION_DURATION_MS = 2800;
  const CONFETTI_PARTICLE_COUNT = 120;
  const CONFETTI_DURATION_MS = 800;

  /* ─── Main lottery ─── */
  function startLottery() {
    if (spinning) return;

    // If first time, parse items
    if (allItems.length === 0) {
      const raw = document.getElementById('itemInput').value;
      const parsed = parseItems(raw);
      if (parsed.length < 1) {
        setStatus('⚠️ 項目を1つ以上入力してください');
        return;
      }
      allItems = parsed;
      remainingItems = [...allItems];
      drawnItems = [];
      document.getElementById('itemInput').disabled = true;
      document.getElementById('itemsCard').style.display = '';
    }

    if (remainingItems.length === 0) {
      setStatus('🏁 全ての項目が抽選済みです！リセットして再スタートしてください。');
      return;
    }

    // Pick winner
    const winnerIdx = Math.floor(Math.random() * remainingItems.length);
    const winner = remainingItems[winnerIdx];

    spinning = true;
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnReset').disabled = true;
    document.getElementById('resultBox').style.display = 'none';
    document.getElementById('speakBtn').style.display = 'none';
    setStatus('🎰 抽選中...');

    // Show roulette card
    const rCard = document.getElementById('rouletteCard');
    rCard.classList.add('visible');

    // Build drum
    const total = buildDrumItems(remainingItems, winner);

    // Animate
    animateDrum(total, () => {
      // Update state
      remainingItems.splice(winnerIdx, 1);
      drawnItems.push(winner);
      lastResult = winner;

      // Show result
      const resultText = document.getElementById('resultText');
      resultText.style.animation = 'none';
      resultText.offsetHeight; // reflow
      resultText.style.animation = '';
      resultText.textContent = winner;

      document.getElementById('resultBox').style.display = '';
      document.getElementById('speakBtn').style.display = '';

      setStatus(remainingItems.length > 0
        ? `残り ${remainingItems.length} 項目 — もう一度ボタンを押すと次の抽選ができます`
        : '🏁 全項目を抽選しました！');

      renderChips();

      // Speak
      speak(`当選は、${winner}！`);

      // Confetti
      launchConfetti();

      spinning = false;
      document.getElementById('btnStart').disabled = false;
      document.getElementById('btnReset').disabled = false;
    });
  }

  /* ─── Reset ─── */
  function resetAll() {
    if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    spinning = false;
    allItems = [];
    remainingItems = [];
    drawnItems = [];
    lastResult = '';

    document.getElementById('itemInput').disabled = false;
    document.getElementById('itemInput').value = '';
    document.getElementById('rouletteCard').classList.remove('visible');
    document.getElementById('drumTrack').innerHTML = '';
    document.getElementById('resultBox').style.display = 'none';
    document.getElementById('speakBtn').style.display = 'none';
    document.getElementById('itemsCard').style.display = 'none';
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnReset').disabled = false;
    setStatus('');
  }

  /* ─── Confetti ─── */
  (function() {
    const canvas = document.getElementById('confettiCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let confettiRunning = false;
    let confettiFrameId = null;

    const COLORS = ['#f9d423','#ff4e50','#56ccf2','#6fcf97','#bb6bd9','#fff'];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function createParticle() {
      return {
        x: Math.random() * canvas.width,
        y: -10,
        r: 6 + Math.random() * 6,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        vx: (Math.random() - 0.5) * 4,
        vy: 3 + Math.random() * 5,
        rot: Math.random() * Math.PI * 2,
        rotV: (Math.random() - 0.5) * 0.2,
        shape: Math.random() > 0.5 ? 'rect' : 'circle',
      };
    }

    function drawParticle(p) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if (p.shape === 'rect') {
        ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.5);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.r / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function confettiLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.rot += p.rotV;
        p.vy += 0.12; // gravity
        drawParticle(p);
      });
      particles = particles.filter(p => p.y < canvas.height + 20);
      if (particles.length > 0 || confettiRunning) {
        confettiFrameId = requestAnimationFrame(confettiLoop);
      } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    }

    window.launchConfetti = function() {
      confettiRunning = true;
      for (let i = 0; i < CONFETTI_PARTICLE_COUNT; i++) {
        particles.push(createParticle());
      }
      if (!confettiFrameId) confettiLoop();
      setTimeout(() => { confettiRunning = false; }, CONFETTI_DURATION_MS);
    };
  })();

  // Pre-load voices (some browsers need this)
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }
</script>
</body>
</html>
